[build]
  command = "npm run build"
  publish = "out"
[build.environment]
  NEXT_DISABLE_TURBOPACK = "1"
  NODE_VERSION = "18"
[[notifications]]
  form_name = "quote"
  [notifications.webhook]
    url = "https://josh.jam-bot.com/social-api/api/leads/webhook/netlify?tenant=josh&site=gunrangeinsurance.com"
    events = ["submission_created"]
